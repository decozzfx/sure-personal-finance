# ===========================================================================
# Production Docker Compose Configuration
# ===========================================================================
#
# Purpose:
# --------
# Production-ready Docker Compose configuration for self hosting
# Sure on your local machine or on a cloud VPS.
#
# Configuration:
# --------------
# - Port: 3010 (changed from default 3000)
# - Uses latest stable image from GitHub Container Registry
# - Includes web, worker, PostgreSQL, and Redis services
# - Health checks and automatic restart policies
# - Persistent volumes for data
#
# Setup:
# ------
# 1. Create a .env file with your environment variables (see .env.example)
# 2. Generate SECRET_KEY_BASE: openssl rand -hex 64
# 3. Run: docker compose up -d
#
# Access:
# -------
# App: http://localhost:3010
#
# For more information:
# -------------------
# https://github.com/we-promise/sure/blob/main/docs/hosting/docker.md
#
# Troubleshooting:
# ----------------
# https://github.com/we-promise/sure/discussions/categories/general
#

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-sure_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sure_password}
  POSTGRES_DB: ${POSTGRES_DB:-sure_production}

x-rails-env: &rails_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  SELF_HOSTED: "true"
  RAILS_ENV: "production"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: "false"
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  # NOTE: enabling OpenAI will incur costs when you use AI-related features in the app (chat, rules)
  # Make sure you have set appropriate spend limits on your account before adding this.
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}
  # Optional: Configure domain for email links and other references
  APP_DOMAIN: ${APP_DOMAIN:-localhost:3010}
  # Optional: Provider for exchange rates and securities (twelve_data or yahoo_finance)
  EXCHANGE_RATE_PROVIDER: ${EXCHANGE_RATE_PROVIDER:-twelve_data}
  SECURITIES_PROVIDER: ${SECURITIES_PROVIDER:-twelve_data}
  # Optional: Email configuration for password resets, reports, etc.
  SMTP_ADDRESS: ${SMTP_ADDRESS}
  SMTP_PORT: ${SMTP_PORT:-465}
  SMTP_USERNAME: ${SMTP_USERNAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_TLS_ENABLED: ${SMTP_TLS_ENABLED:-true}
  EMAIL_SENDER: ${EMAIL_SENDER}

services:
  web:
    image: ghcr.io/we-promise/sure:stable
    container_name: sure-web
    volumes:
      - app-storage:/rails/storage
    # ports:
    #   - 3010:3000  # Commented out - Dokploy's Traefik handles routing
    restart: unless-stopped
    environment:
      <<: *rails_env
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sure_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/we-promise/sure:stable
    container_name: sure-worker
    command: bundle exec sidekiq
    volumes:
      - app-storage:/rails/storage
    restart: unless-stopped
    environment:
      <<: *rails_env
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bundle", "exec", "rake", "sidekiq:ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sure_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: sure-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
      # PostgreSQL performance tuning
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sure_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: sure-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sure_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app-storage:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  sure_net:
    driver: bridge
